server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Esta linha é o segredo: redireciona tudo para o index.html
        try_files $uri $uri/ /index.html;
    }

    # Opcional: Cache para arquivos estáticos (assets)
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}